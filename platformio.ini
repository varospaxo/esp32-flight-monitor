
[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs

; Fix Windows ar.exe race condition
board_build.scons_unbuffered_io = yes
build_flags =
  -D USER_SETUP_LOADED=1
  -D ILI9341_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D TFT_MOSI=23
  -D TFT_SCLK=18
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=4
  -D SPI_FREQUENCY=40000000
  -D TOUCH_CS=255
  -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1

; -fpermissive only for C++ (avoids cc1 warning on C files)
build_src_flags = -fpermissive

lib_deps =
  mathieucarbou/ESP Async WebServer
  mathieucarbou/AsyncTCP
  bblanchon/ArduinoJson
  bodmer/TFT_eSPI
  bodmer/TJpg_Decoder
  ayushsharma82/ElegantOTA

; Ignore the old me-no-dev fork that ElegantOTA pulls in
; (our mathieucarbou fork "ESP Async WebServer" provides the same API)
lib_ignore = ESPAsyncWebServer
lib_ldf_mode = deep+

[platformio]
build_jobs = 1
upload_speed = 115200
monitor_speed = 115200